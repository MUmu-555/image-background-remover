name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          echo "node_modules exists: $(test -d node_modules && echo yes || echo no)"
          echo "next binary: $(test -f node_modules/.bin/next && echo yes || echo no)"

      - name: Build
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          next build
        env:
          REMOVEBG_API_KEY: ${{ secrets.REMOVEBG_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=image-background-remover --branch=main
